<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title or "AI Quiz" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="bg">
    <img class="decor decor--orb" src="{{ url_for('static', filename='graphics/orb.svg') }}" alt="" aria-hidden="true">
    <img class="decor decor--wave" src="{{ url_for('static', filename='graphics/wave.svg') }}" alt="" aria-hidden="true">
    <header class="nav">
      <div class="nav__inner">
        <a class="brand" href="/dashboard">AI Quiz</a>
        <nav class="nav__links">
          {% if session.get("user") %}
            <a href="/dashboard">Dashboard</a>
            <a href="/trainer">New Quiz</a>
            <a class="btn btn--ghost" href="/logout">Logout</a>
          {% else %}
            <a href="/login">Login</a>
            <a class="btn btn--ghost" href="/register">Register</a>
          {% endif %}
        </nav>
      </div>
    </header>

    <main class="page">
      <div class="container">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
</body>
</html>
